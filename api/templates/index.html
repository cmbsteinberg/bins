<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>UK Bin Collections</title>
  <link rel="stylesheet" href="https://unpkg.com/axist@latest/dist/axist.min.css">
  <style>
    :root { --bin-green: #4caf50; --bin-muted: #78909c; }
    .hidden { display: none; }
    #error { color: #e53935; }
    main > h1, main > p { text-align: center; }
    #results article { margin-top: 1rem; }
    .collection-date { color: #666; font-size: 0.9rem; }

    /* Bin group card */
    .bin-group { border: 1px solid #e0e0e0; border-radius: 8px; padding: 0.75rem 1rem; margin-bottom: 0.75rem; }
    .bin-next { display: flex; align-items: center; gap: 0.75rem; }
    .bin-icon { flex-shrink: 0; width: 36px; height: 36px; }
    .bin-icon svg { width: 100%; height: 100%; }
    .bin-info { flex: 1; }
    .bin-type { font-weight: 600; margin: 0; font-size: 1rem; }
    .bin-date { margin: 0; color: #555; font-size: 0.95rem; }
    .bin-relative { font-size: 0.8rem; color: var(--bin-green); font-weight: 500; }
    .bin-relative.past { color: #e53935; }

    /* Pure CSS accordion for future dates */
    .bin-more { margin-top: 0.5rem; }
    .bin-more summary { cursor: pointer; font-size: 0.85rem; color: var(--bin-muted); list-style: none; }
    .bin-more summary::-webkit-details-marker { display: none; }
    .bin-more summary::before { content: "▸ "; }
    .bin-more[open] summary::before { content: "▾ "; }
    .bin-more ul { margin: 0.25rem 0 0 0; padding-left: 1.25rem; }
    .bin-more li { font-size: 0.85rem; color: #666; padding: 0.15rem 0; }
  </style>
</head>
<body>
  <nav>
    <ul><li><strong>UK Bin Collections</strong></li></ul>
    <ul>
      <li><a href="/">Home</a></li>
      <li><a href="/coverage">Coverage</a></li>
      <li><a href="/api-docs">API</a></li>
    </ul>
  </nav>
  <main>
    <h1>UK Bin Collections</h1>
    <p>Find your next bin collection dates.</p>

    <section id="step-postcode">
      <form id="postcode-form">
        <label for="postcode">Enter your postcode</label>
        <fieldset role="group">
          <input id="postcode" type="text" name="postcode" placeholder="e.g. BR8 7RE" required>
          <button type="submit">Search</button>
        </fieldset>
      </form>
    </section>

    <section id="step-address" class="hidden">
      <label for="address-select">Select your address</label>
      <select id="address-select">
        <option value="">-- Choose address --</option>
      </select>
      <button id="address-btn" type="button" disabled>Get bin dates</button>
      <button id="back-btn" type="button">Back</button>
    </section>

    <section id="results" class="hidden"></section>
    <p id="error" class="hidden"></p>
  </main>

  <script type="module" src="/static/app.js"></script>
</body>
</html>
