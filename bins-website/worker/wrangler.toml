# Cloudflare Worker Configuration
# https://developers.cloudflare.com/workers/wrangler/configuration/

name = "bins-cors-proxy"
main = "cors-proxy.js"
compatibility_date = "2024-01-01"

# Worker will be deployed to *.workers.dev subdomain
# After deployment, update CORS_PROXY_URL in app.js with the actual URL

# Uncomment and configure if you want to use a custom domain:
# routes = [
#   { pattern = "api.yourdomain.com/*", zone_name = "yourdomain.com" }
# ]

# Environment variables (optional)
# [env.production]
# vars = { ENVIRONMENT = "production" }

# Rate limiting (configure in Cloudflare dashboard for better control)
# Or use bindings if you need KV storage for rate limiting

[build]
command = ""

# Limits (free tier defaults shown)
# Free tier: 100,000 requests/day, 10ms CPU time per request
# https://developers.cloudflare.com/workers/platform/limits/
