council: ChelmsfordCityCouncil
request_type: selenium
required_user_input:
- postcode
- house_number
status: not_implemented
notes: Requires Playwright/Selenium automation - not yet implemented as HTTP requests
api_description: The first request performs a search using the postcode. The resulting
  HTML page contains a table of addresses with their corresponding collection day
  and schedule group (e.g., Tuesday B). Using this day and group, a second GET request
  is made to a specific calendar URL to retrieve the ICS file link.
