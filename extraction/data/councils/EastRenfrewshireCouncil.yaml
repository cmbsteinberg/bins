api_description: The logic flows from a postcode lookup to an address/UPRN selection,
  which then submits a form to retrieve bin collection dates. This pattern usually
  involves an initial POST to find addresses and a subsequent POST or GET with the
  selected UPRN to retrieve the schedule.
