council: EastRidingCouncil
request_type: selenium
required_user_input:
- postcode
- house_number
status: not_implemented
notes: Requires Playwright/Selenium automation - not yet implemented as HTTP requests
api_description: The site uses a waste recycling API hosted on a separate subdomain.
  It first looks up the address based on a postcode, which returns a list of address
  objects containing IDs. Once the user selects their specific address (house number),
  a second GET request is made to the collections endpoint using that address ID.
