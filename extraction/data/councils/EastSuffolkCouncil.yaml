notes: Requires Playwright/Selenium automation - not yet implemented as HTTP requests
api_description: The form uses a multi-step AJAX process within an iframe. It first
  performs a lookup based on the postcode to populate a dropdown, and then, upon selecting
  a UPRN, it triggers a background POST request to the back-end (likely a 'fillform'
  or 'process' endpoint) which returns the collection details table.
