council: FifeCouncil
request_type: selenium
required_user_input:
- postcode
- house_number
status: not_implemented
notes: Requires Playwright/Selenium automation - not yet implemented as HTTP requests
api_description: 'The process involves two main steps: first, a POST request to the
  ''propertysearch'' widget with a postcode to retrieve a list of addresses and their
  IDs (UPRNs). Second, a POST request to the ''powersuite_bin_calendar_collections''
  action using the specific UPRN to retrieve the collection dates.'
