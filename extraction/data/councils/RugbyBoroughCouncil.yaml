council: RugbyBoroughCouncil
request_type: selenium
required_user_input:
- postcode
- uprn
status: not_implemented
notes: Requires Playwright/Selenium automation - not yet implemented as HTTP requests
api_description: The site uses standard form submissions on a Liferay portal. It requires
  an initial GET to establish a session and get a CSRF token (p_auth), followed by
  a POST to lookup addresses by postcode, and a final POST with the selected UPRN
  to retrieve the bin schedule.
