council: SouthLanarkshireCouncil
request_type: selenium
required_user_input:
- postcode
- address_label
status: not_implemented
notes: Requires Playwright/Selenium automation - not yet implemented as HTTP requests
api_description: The site uses a standard multi-step form. First, a POST request is
  made with the postcode to retrieve a list of addresses. Then, a second POST request
  is made with the selected address ID or label to retrieve the specific collection
  calendar page.
