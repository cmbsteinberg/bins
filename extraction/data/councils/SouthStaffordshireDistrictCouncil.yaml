council: SouthStaffordshireDistrictCouncil
request_type: id_lookup_then_api
required_user_input:
- uprn
api_urls:
- https://www.sstaffs.gov.uk/bin-collection-dates?uprn={uprn}
api_methods:
- GET
api_description: The council website takes a UPRN as a query parameter and returns
  an HTML page containing a div with the ID showCollectionDates, which includes both
  the next collection date and a table of future collections.
response_format: html
bin_selector: '#showCollectionDates table.leisure-table tr'
date_format: Day DD Month YYYY
