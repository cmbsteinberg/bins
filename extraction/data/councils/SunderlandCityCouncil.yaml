council: SunderlandCityCouncil
request_type: selenium
required_user_input:
- postcode
- house_number
status: not_implemented
notes: Requires Playwright/Selenium automation - not yet implemented as HTTP requests
api_description: The site uses a standard ASP.NET WebForms pattern. It requires an
  initial GET to obtain session state (__VIEWSTATE), followed by a POST to lookup
  addresses by postcode, and a final POST with the selected address ID (UPRN) to retrieve
  bin collection dates.
