council: TestValleyBoroughCouncil
request_type: selenium
required_user_input:
- postcode
- house_number
status: not_implemented
notes: Requires Playwright/Selenium automation - not yet implemented as HTTP requests
api_description: Likely follows an id_lookup_then_api pattern where the postcode returns
  a list of UPRNs/addresses, and selecting one triggers a second request for the schedule.
  However, many UK council sites use complex ASP.NET ViewState or CSRF tokens that
  make simple 'requests' difficult without maintaining a session, hence the 'selenium'
  request type is currently used. Conversion to requests is likely possible but requires
  inspecting the form submission payload (XHR vs Standard Form POST).
